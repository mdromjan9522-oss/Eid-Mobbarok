<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Component</title>
    <link rel="icon" type="image/png" href="mosque.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars" id="star-container"></div>
    <div class="moon"></div>
    
    <!-- Decorative Lanterns -->
    <div class="lantern" style="top: -10px; left: 10%;"></div>
    <div class="lantern" style="top: -20px; right: 20%;"></div>

    <div class="container">
        <div class="card">
            <div class="card-content">
                <div class="profile-image-container">
                    <img src="2.png" alt="Profile Picture" class="profile-image">
                </div>
                <h2 class="card-title">Profile Info:</h2>
                <div class="card-details">
                    <p><strong>Name:</strong> Romjan</p>
                    <p><strong>Age:</strong> 15</p>
                    <p><strong>Gmail:</strong> mdromjan9522@gmail.com</p>
                </div>
                <a href="eid.html" class="card-button">Click Here</a>
            </div>
        </div>
        <footer class="developed-by">
            Developed By Romjan
        </footer>
    </div>

    <script>
        // Create random stars
        const container = document.getElementById('star-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
